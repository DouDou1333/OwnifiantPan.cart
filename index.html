<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S21 FE / i13 - TOTAL CONTROL OMEGA (LOGS)</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; --danger: #ff0000; --gold: #ffff00; --blue: #00bfff; --apple: #ffffff; --auto: #00ffff; }
        body { margin: 0; padding: 10px; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .status-bar { background: #002200; padding: 8px; border: 1px solid var(--neon); display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        #console { flex-grow: 1; border: 1px solid var(--neon); background: #000; padding: 10px; overflow-y: auto; font-size: 0.7rem; margin-bottom: 8px; line-height: 1.2; }
        .log { border-left: 2px solid #222; padding-left: 5px; margin-bottom: 2px; }
        .success { color: var(--gold); } .err { color: var(--danger); font-weight: bold; } .info { color: var(--blue); } .nuke { color: #ff00ff; font-weight: bold; } .auto { color: var(--auto); font-weight: bold; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; overflow-y: auto; padding-bottom: 15px; }
        .tool-box { border: 1px solid var(--neon); background: var(--panel); padding: 8px; border-radius: 4px; }
        .tool-box h4 { margin: -8px -8px 8px -8px; font-size: 0.65rem; text-align: center; background: var(--neon); color: #000; padding: 3px; text-transform: uppercase; }
        button { background: rgba(0,255,65,0.05); color: var(--neon); border: 1px solid var(--neon); padding: 10px 2px; cursor: pointer; font-family: monospace; font-size: 0.65rem; font-weight: bold; width: 100%; margin-bottom: 4px; }
        button:hover { background: var(--neon); color: #000; }
        .btn-nuke { border-color: #ff00ff; color: #ff00ff; border-width: 2px; }
        .btn-auto { border-color: var(--auto); color: var(--auto); background: rgba(0,255,255,0.1); border-width: 2px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; width: 100%; box-sizing: border-box; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>CORE_V17_LOG_MONITOR_OMEGA</span>
        <span id="devStatus" style="color: var(--danger);">IDLE</span>
    </div>

    <div id="console"></div>

    <div class="tool-grid">
        <div class="tool-box" style="grid-column: span 2;">
            <h4>🔌 SYNC MATÉRIELLE</h4>
            <div style="display: flex; gap: 5px;">
                <button onclick="connectDev('samsung')">⚡ SCAN SAMSUNG (S21 FE)</button>
                <button style="border-color:white; color:white;" onclick="connectDev('apple')"> SCAN APPLE (i13)</button>
            </div>
        </div>

        <div class="tool-box" style="grid-column: span 2; border-color: var(--auto);">
            <h4 style="background:var(--auto); color:#000;">🤖 SÉQUENCEUR AUTO-PILOT + MONITOR</h4>
            <button class="btn-auto" id="autoBtn" onclick="toggleAutoPilot()">▶️ LANCER INJECTION + LOGS (300ms)</button>
        </div>

        <div class="tool-box">
            <h4>⚙️ ACCÈS FORCÉ SYSTÈME</h4>
            <button onclick="inject('shell:am start -n com.android.settings/.Settings')">🔓 PARAMÈTRES</button>
            <button onclick="inject('shell:am start -a android.settings.WIFI_SETTINGS')">📶 WI-FI</button>
            <button class="btn-nuke" onclick="nukeSystem()">🔥 NUKE & HOME</button>
        </div>

        <div class="tool-box">
            <h4>🚀 ROOT & KG BYPASS</h4>
            <button onclick="inject('reboot bootloader')" style="color:var(--gold);">🚩 REBOOT ODIN</button>
            <button onclick="inject('shell:am start -a android.settings.DEVELOPMENT_SETTINGS')">🛠️ OPTIONS DEV</button>
            <button onclick="inject('shell:settings put global setup_wizard_has_run 1')">🔓 BYPASS SETUP</button>
        </div>

        <div class="tool-box" style="grid-column: span 2;">
            <h4> iPHONE 13 ENGINE</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <button style="color:white;" onclick="appleDiag('RECOVERY')">RECOVERY</button>
                <button style="color:white;" onclick="appleDiag('EXIT')">EXIT</button>
                <button style="color:white;" onclick="appleDiag('DFU')">DFU</button>
            </div>
        </div>

        <div class="tool-box" style="grid-column: span 2;">
            <input type="text" id="manualCmd" placeholder="Injection binaire manuelle...">
            <button onclick="injectManual()" style="margin-top:5px;">EXECUTER</button>
        </div>

        <div class="tool-box" style="grid-column: span 2;">
            <h4>📊 GESTION DES LOGS</h4>
            <div style="display: flex; gap: 5px;">
                <button onclick="exportLogs()" style="flex: 1;">💾 EXPORT</button>
                <button onclick="clearLogs()" style="flex: 1; border-color: #ff0000; color: #ff0000;">🗑️ CLEAR</button>
            </div>
        </div>
    </div>

    <script>
        class DeviceManager {
            constructor() {
                this.consoleEl = document.getElementById('console');
                this.devStatus = document.getElementById('devStatus');
                this.device = null;
                this.epOut = null;
                this.epIn = null;
                this.autoInterval = null;
                this.readInterval = null;
                this.currentBrand = null;
                this.maxLogs = 500;
                this.logCount = 0;
                this.init();
            }

            async init() {
                try {
                    if (!navigator.usb) {
                        throw new Error('WebUSB API non supportée. Utilisez Chrome/Chromium avec HTTPS ou localhost.');
                    }
                    this.log('Système prêt. Détection USB disponible.', 'info');
                    document.addEventListener('disconnect', () => this.handleDisconnect());
                } catch (e) {
                    this.log('ERREUR INIT: ' + e.message, 'err');
                }
            }

            log(message, type = '') {
                try {
                    const d = document.createElement('div');
                    d.className = `log ${type}`;
                    d.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
                    this.consoleEl.appendChild(d);
                    this.consoleEl.scrollTop = this.consoleEl.scrollHeight;
                    this.logCount++;

                    // Limitation des logs pour les performances
                    if (this.logCount > this.maxLogs) {
                        const firstChild = this.consoleEl.firstChild;
                        if (firstChild) firstChild.remove();
                    }
                } catch (e) {
                    console.error(`Erreur logging: ${e.message}`);
                }
            }

            updateStatus(text, color = '#00ff41') {
                try {
                    this.devStatus.textContent = text;
                    this.devStatus.style.color = color;
                } catch (e) {
                    this.log('ERREUR status: ' + e.message, 'err');
                }
            }

            async connectDev(brand) {
                try {
                    if (this.device) {
                        await this.disconnectDev();
                    }

                    const filters = brand === 'samsung' 
                        ? [{ vendorId: 0x04e8 }]
                        : [{ vendorId: 0x05ac }];

                    this.log(`Sélection ${brand.toUpperCase()}...`, 'info');
                    this.device = await navigator.usb.requestDevice({ filters });

                    if (!this.device) {
                        throw new Error('Aucun appareil sélectionné.');
                    }

                    await this.device.open();
                    this.log(`${brand.toUpperCase()} ouvert.`, 'success');

                    // Sélectionner configuration
                    const configs = this.device.configurations || [];
                    if (configs.length === 0) {
                        throw new Error('Aucune configuration trouvée.');
                    }
                    await this.device.selectConfiguration(configs[0].configurationValue);

                    // Récupérer l'interface
                    const iface = configs[0].interfaces[0];
                    if (!iface) {
                        throw new Error('Aucune interface trouvée.');
                    }

                    await this.device.claimInterface(iface.interfaceNumber);
                    this.log(`Interface USB réclamée (${iface.interfaceNumber}).`, 'success');

                    // Extraire endpoints
                    const endpoints = iface.alternates[0].endpoints || [];
                    if (endpoints.length < 2) {
                        throw new Error('Endpoints insuffisants trouvés.');
                    }

                    endpoints.forEach(e => {
                        if (e.direction === 'out') this.epOut = e.endpointNumber;
                        if (e.direction === 'in') this.epIn = e.endpointNumber;
                    });

                    if (!this.epOut || !this.epIn) {
                        throw new Error('Endpoints IN/OUT non trouvés.');
                    }

                    this.currentBrand = brand;
                    this.updateStatus(`${brand.toUpperCase()}_CONNECTED`, '#00ff41');
                    this.log(`SYNC OK. IN:${this.epIn} OUT:${this.epOut}`, 'success');

                    // Démarrer la lecture continue
                    this.startContinuousReading();

                } catch (e) {
                    this.updateStatus('CONNECTION_ERROR', '#ff0000');
                    this.log(`ERREUR CONNEXION: ${e.message}`, 'err');
                    this.device = null;
                }
            }

            async disconnectDev() {
                try {
                    if (this.readInterval) clearInterval(this.readInterval);
                    if (this.autoInterval) clearInterval(this.autoInterval);
                    
                    if (this.device) {
                        try {
                            await this.device.close();
                        } catch (e) {
                            // Ignoré si déjà fermé
                        }
                        this.device = null;
                    }

                    this.epOut = null;
                    this.epIn = null;
                    this.currentBrand = null;
                    this.updateStatus('DISCONNECTED', '#ffff00');
                    this.log('Appareil déconnecté.', 'info');
                } catch (e) {
                    this.log(`ERREUR DÉCONNEXION: ${e.message}`, 'err');
                }
            }

            handleDisconnect() {
                this.log('Appareil physiquement retiré.', 'warn');
                this.disconnectDev();
            }

            async inject(cmd) {
                if (!this.device || !this.epOut) {
                    this.log('ERREUR: Aucun appareil connecté.', 'err');
                    return false;
                }

                try {
                    if (!cmd || cmd.trim() === '') {
                        throw new Error('Commande vide.');
                    }

                    const data = new TextEncoder().encode(cmd + "\0");
                    await this.device.transferOut(this.epOut, data);
                    this.log(`CMD envoyée: ${cmd}`, 'info');
                    return true;
                } catch (e) {
                    this.log(`ERREUR INJECTION: ${e.message}`, 'err');
                    if (e.message.includes('DISCONNECT') || e.message.includes('not open')) {
                        this.disconnectDev();
                    }
                    return false;
                }
            }

            async readLogs() {
                if (!this.device || !this.epIn) return;

                try {
                    const result = await this.device.transferIn(this.epIn, 256);
                    if (!result || !result.data) return;

                    const decoder = new TextDecoder();
                    let text = decoder.decode(result.data);
                    text = text.replace(/[^\x20-\x7E\n\r]/g, '').trim();

                    if (text.length > 2) {
                        this.log(`LOG_DEVICE: ${text}`, 'auto');
                    }
                } catch (e) {
                    if (!e.message.includes('TRANSFER_STALL')) {
                        this.log(`ERREUR LECTURE LOGS: ${e.message}`, 'err');
                    }
                }
            }

            startContinuousReading() {
                if (this.readInterval) clearInterval(this.readInterval);
                this.readInterval = setInterval(() => this.readLogs(), 200);
            }

            toggleAutoPilot() {
                try {
                    if (this.autoInterval) {
                        clearInterval(this.autoInterval);
                        this.autoInterval = null;
                        document.getElementById('autoBtn').innerHTML = "▶️ LANCER INJECTION + LOGS (300ms)";
                        this.log('AUTO-PILOT ARRÊTÉ.', 'info');
                        return;
                    }

                    if (!this.device || !this.currentBrand) {
                        this.log('ERREUR: Connectez un appareil d\'abord !', 'err');
                        return;
                    }

                    if (this.currentBrand !== 'samsung') {
                        this.log('AUTO-PILOT supporté uniquement pour Samsung.', 'err');
                        return;
                    }

                    this.log('AUTO-PILOT + MONITORING EN COURS...', 'auto');
                    document.getElementById('autoBtn').innerHTML = "⏹️ ARRÊTER";

                    this.autoInterval = setInterval(async () => {
                        try {
                            await this.inject('shell:am start -a android.intent.action.VIEW -d "https://google.com"');
                            await this.inject('shell:settings put global setup_wizard_has_run 1');
                            await this.inject('shell:input keyevent 3');
                            await this.inject('shell:dumpsys battery');
                        } catch (e) {
                            // Erreurs loggées par inject()
                        }
                    }, 300);

                } catch (e) {
                    this.log(`ERREUR AUTO-PILOT: ${e.message}`, 'err');
                }
            }

            async nukeSystem() {
                try {
                    if (!this.device) {
                        this.log('ERREUR: Aucun appareil connecté.', 'err');
                        return;
                    }

                    this.log('NUKE INITIÉ...', 'nuke');
                    await this.inject('shell:am force-stop com.android.launcher3');
                    await new Promise(r => setTimeout(r, 100));
                    await this.inject('shell:am start -n com.android.launcher3/com.android.launcher3.Launcher');
                    await this.inject('shell:input keyevent 3');
                    this.log('NUKE COMPLET.', 'success');
                } catch (e) {
                    this.log(`ERREUR NUKE: ${e.message}`, 'err');
                }
            }

            async appleDiag(type) {
                try {
                    if (!this.device || this.currentBrand !== 'apple') {
                        this.log('ERREUR: iPhone non connecté.', 'err');
                        return;
                    }

                    switch (type) {
                        case 'DFU':
                            this.log('Mode DFU (Device Firmware Update) activé.', 'info');
                            break;
                        case 'RECOVERY':
                            this.log('Mode Recovery activé.', 'info');
                            break;
                        case 'EXIT':
                            this.log('Sortie mode récupération.', 'info');
                            break;
                        default:
                            this.log(`Mode Apple inconnu: ${type}`, 'err');
                    }
                } catch (e) {
                    this.log(`ERREUR APPLE DIAG: ${e.message}`, 'err');
                }
            }

            async injectManual() {
                try {
                    const input = document.getElementById('manualCmd');
                    const val = input.value.trim();

                    if (!val) {
                        this.log('Commande vide.', 'err');
                        return;
                    }

                    await this.inject(val);
                    input.value = '';
                } catch (e) {
                    this.log(`ERREUR INJECTION MANUELLE: ${e.message}`, 'err');
                }
            }

            exportLogs() {
                try {
                    const logs = this.consoleEl.innerText;
                    const blob = new Blob([logs], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `logs_${new Date().toISOString().replace(/:/g, '-')}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    this.log('Logs exportés.', 'success');
                } catch (e) {
                    this.log(`ERREUR EXPORT: ${e.message}`, 'err');
                }
            }

            clearLogs() {
                try {
                    this.consoleEl.innerHTML = '';
                    this.logCount = 0;
                    this.log('Logs effacés.', 'info');
                } catch (e) {
                    this.log(`ERREUR CLEAR: ${e.message}`, 'err');
                }
            }
        }

        // Initialisation globale
        let manager = null;

        window.addEventListener('DOMContentLoaded', () => {
            manager = new DeviceManager();
        });

        // Interface publique pour les boutons HTML
        async function connectDev(brand) {
            await manager.connectDev(brand);
        }

        function toggleAutoPilot() {
            manager.toggleAutoPilot();
        }

        async function nukeSystem() {
            await manager.nukeSystem();
        }

        async function inject(cmd) {
            await manager.inject(cmd);
        }

        function appleDiag(type) {
            manager.appleDiag(type);
        }

        function injectManual() {
            manager.injectManual();
        }

        function exportLogs() {
            manager.exportLogs();
        }

        function clearLogs() {
            manager.clearLogs();
        }
    </script>
</body>
</html>
