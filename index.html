<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S21 FE / i113 - TOTAL CONTROL OMEGA (SIMU)</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    :root {
      --neon: #00ff41;
      --bg: #050505;
      --gold: #ffd700;
      --auto: #00ffff;
      --nuke: #ff00ff;
    }
    body {
      margin: 0;
      padding: 10px;
      background: var(--bg);
      color: #ddd;
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      background: #002200;
      padding: 8px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #0f0;
    }
    #console {
      flex-grow: 1;
      border: 1px solid #0f0;
      padding: 10px;
      overflow-y: auto;
      background: #000;
      margin: 10px 0;
    }
    .log {
      border-left: 2px solid #222;
      padding-left: 8px;
      margin: 4px 0;
    }
    .success { color: var(--gold); }
    .err { color: #ff4444; }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .tool-box {
      border: 1px solid var(--neon);
      border-radius: 6px;
      padding: 12px;
      background: rgba(0,255,65,0.03);
    }
    .tool-box h4 {
      margin: -8px -8px 8px -8px;
      padding: 8px;
      background: rgba(0,255,65,0.1);
      text-align: center;
    }
    button {
      background: rgba(0,255,65,0.05);
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 10px 16px;
      margin: 4px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: var(--neon);
      color: #000;
    }
    .btn-nuke { border-color: #ff00ff; color: #ff00ff; }
    .btn-auto { border-color: var(--auto); color: var(--auto); }
    input {
      background: #000;
      border: 1px solid #333;
      color: #0f0;
      padding: 8px;
      width: 70%;
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <span>CORE_V17_LOG_MONITOR_OMEGA</span>
    <span id="devStatus" style="color: #888; margin-left: 20px;">DISCONNECTED</span>
  </div>

  <div id="console"></div>

  <div class="tool-grid">

    <div class="tool-box" style="grid-column: span 2;">
      <h4>⚡ SYNC MATÉRIELLE</h4>
      <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
        <button onclick="debugSamsungUSB()">SCAN SAMSUNG (521 FE)</button>
        <button onclick="manager.disconnectDev()">DISCONNECT</button>
      </div>
    </div>

    <div class="tool-box">
      <h4>🤖 AUTO-PILOT + MONITOR</h4>
      <button class="btn-auto" id="autoBtn" onclick="toggelleAutoPilot()">ACTIVER AUTO-PILOT</button>
    </div>

    <div class="tool-box">
      <h4>🔒 ACCÈS FORCÉ SYSTÈME</h4>
      <button onclick="inject('shell:am start -n com.android.settings/.Settings')">OUVRIR PARAMÈTRES</button>
      <button onclick="inject('shell:am force-stop com.samsung.android.app.galaxyfinder')">KILL GALAXY FINDER</button>
      <button class="btn-nuke" onclick="nukeSystem()">NUKE SYSTÈME</button>
    </div>

    <div class="tool-box">
      <h4>🚀 ROOT & KG BYPASS</h4>
      <button onclick="inject('reboot bootloader')">REBOOT BOOTLOADER</button>
      <button onclick="inject('shell:am start -a android.intent.action.VIEW -d https://samfw.com')">SAMFW FRP</button>
      <button onclick="inject('shell:settings put global adb_enabled 1')">ADB ENABLE</button>
    </div>

    <div class="tool-box" style="grid-column: span 2;">
      <h4>📱 iPHONE 13 ENGINE</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button style="color:white;" onclick="appleDiag('DFU')">ENTRER DFU</button>
        <button style="color:white;" onclick="appleDiag('RECOVERY')">ENTRER RECOVERY</button>
        <button style="color:white;" onclick="appleDiag('EXIT')">SORTIR MODE</button>
      </div>
    </div>

    <div class="tool-box" style="grid-column: span 2;">
      <h4>⌨ GESTION DES LOGS</h4>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <input type="text" id="manualCmd" placeholder="Commande manuelle...">
        <button onclick="injectManual()">ENVOYER</button>
        <button onclick="exportLogs()">EXPORTER LOGS</button>
        <button onclick="clearLogs()">CLEAR LOGS</button>
      </div>
    </div>

  </div>

  <script>
    class DeviceManager {
      constructor() {
        this.consoleEL = document.getElementById('console');
        this.devStatus = document.getElementById('devStatus');
        this.device = null;
        this.epOut = null;
        this.epIn = null;
        this.autoInterval = null;
        this.readInterval = null;
        this.currentBrand = null;
        this.maxLogs = 500;
        this.logCount = 0;
        this.init();
      }

      async init() {
        try {
          if (!navigator.usb) {
            throw new Error("WebUSB non supporté par ce navigateur");
          }
          document.addEventListener('DOMContentLoaded', () => {
            this.log('WebUSB détecté. Prêt pour connexion.', 'success');
          });
        } catch (e) {
          this.log('ERREUR INIT: ' + e.message, 'err');
        }
      }

      log(message, type = '') {
        try {
          const d = document.createElement('div');
          d.className = `log ${type}`;
          d.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
          this.consoleEL.appendChild(d);
          this.consoleEL.scrollTop = this.consoleEL.scrollHeight;
          this.logCount++;
          if (this.logCount > this.maxLogs) {
            const first = this.consoleEL.firstChild;
            if (first) first.remove();
            this.logCount--;
          }
        } catch (e) {
          console.error('Erreur logging:', e);
        }
      }

      updateStatus(text, color = '#00ff41') {
        try {
          this.devStatus.textContent = text;
          this.devStatus.style.color = color;
        } catch (e) {
          this.log('ERREUR status: ' + e.message);
        }
      }

      async connectDev(brand) {
        try {
          if (this.device) {
            await this.disconnectDev();
          }

          this.log(`Sélection ${brand.toUpperCase()}...`);

          this.device = await navigator.usb.requestDevice({
            filters: [{ vendorId: 0x04e8 }]
          });

          if (!this.device) {
            throw new Error('Aucun appareil sélectionné');
          }

          await this.device.open();
          this.log(`${brand.toUpperCase()} ouvert.`);

          // Debug configurations
          const configs = this.device.configurations || [];
          this.log(`Configurations trouvées: ${configs.length}`);

          if (configs.length === 0) {
            throw new Error('Aucune configuration disponible');
          }

          await this.device.selectConfiguration(1); // la plus courante
          this.log('Configuration 1 sélectionnée');

          // Essayer plusieurs interfaces
          let claimed = false;
          for (let i = 0; i < 3; i++) {
            try {
              await this.device.claimInterface(i);
              this.log(`Interface ${i} USB réclamée (0).`);
              claimed = true;
              break;
            } catch (e) {
              this.log(`Interface ${i} refusée: ${e.message}`);
            }
          }

          if (!claimed) {
            throw new Error('Aucune interface réclamable');
          }

          // Extraire endpoints
          const iface = configs[0].interfaces.find(intf => intf.claimed) || configs[0].interfaces[0];
          const alternates = iface.alternates || [];
          const endpoints = alternates[0]?.endpoints || [];

          this.log(`Endpoints trouvés: ${endpoints.length}`);

          endpoints.forEach(e => {
            if (e.direction === 'out' && e.type === 'bulk') {
              this.epOut = e;
            }
            if (e.direction === 'in' && e.type === 'bulk') {
              this.epIn = e;
            }
          });

          if (!this.epOut || !this.epIn) {
            throw new Error('Endpoints insuffisants trouvés (IN/OUT bulk manquants)');
          }

          this.currentBrand = brand;
          this.updateStatus(`SYNC OK - ${brand.toUpperCase()}`, '#00ff41');
          this.log('SYNC OK. IN:' + this.epIn.endpointNumber + ' OUT:' + this.epOut.endpointNumber, 'success');

          // Démarrer lecture continue si besoin
          // this.startContinuousReading();

        } catch (e) {
          this.updateStatus('CONNECTION ÉCHEC', '#ff4444');
          this.log('ERREUR CONNEXION: ' + e.message, 'err');
          this.device = null;
        }
      }

      async disconnectDev() {
        try {
          if (this.readInterval) clearInterval(this.readInterval);
          if (this.autoInterval) clearInterval(this.autoInterval);

          if (this.device) {
            try {
              await this.device.close();
            } catch (e) {}
          }

          this.device = null;
          this.epIn = null;
          this.epOut = null;
          this.updateStatus('DISCONNECTED', '#888');
          this.log('Déconnexion effectuée.', 'success');
        } catch (e) {
          this.log('ERREUR déconnexion: ' + e.message);
        }
      }

      // Les autres fonctions (inject, readLogs, toggleAutoPilot, etc.) restent inchangées
      // ... (tu peux les garder telles quelles ou les copier depuis ton ancien code)

    }

    const manager = new DeviceManager();

    // Fonction debug complète (appelée par le bouton SCAN)
    async function debugSamsungUSB() {
      await manager.connectDev('SAMSUNG');
    }

    // Fonctions interface (inchangées)
    async function connectDev(brand) { await manager.connectDev(brand); }
    function toggelleAutoPilot() { manager.toggelleAutoPilot(); }
    async function nukeSystem() { await manager.nukeSystem(); }
    async function inject(cmd) { await manager.inject(cmd); }
    function injectManual() { manager.injectManual(); }
    function exportLogs() { manager.exportLogs(); }
    function clearLogs() { manager.clearLogs(); }
    function appleDiag(type) { manager.appleDiag(type); }

    // Pour auto-pilot (exemple simplifié)
    DeviceManager.prototype.toggelleAutoPilot = function() {
      if (this.autoInterval) {
        clearInterval(this.autoInterval);
        this.autoInterval = null;
        this.log('AUTO-PILOT ARRÊTÉ');
        return;
      }
      this.log('AUTO-PILOT + MONITOR activé');
      this.autoInterval = setInterval(async () => {
        try {
          await this.inject('shell:am start -n com.android.settings/.Settings');
          await this.inject('shell:am force-stop com.samsung.android.app.galaxyfinder');
          await this.inject('shell:settings put global adb_enabled 1');
        } catch (e) {
          this.log('ERREUR AUTO-PILOT: ' + e.message);
        }
      }, 30000);
    };

  </script>

</body>
</html>
